spring.application.name=ai-sandboxes-basic
server.port=8080

# ---------------------------------------------------------------------------
# Ollama — local LLM server
# Ollama must be running at this URL with the gemma4:e2b model pulled.
# Start Ollama: ollama serve
# Pull model:   ollama pull gemma4:e2b
# ---------------------------------------------------------------------------
ollama.base-url=http://localhost:11434
ollama.model=qwen2.5-coder:1.5b

# ---------------------------------------------------------------------------
# E2B — cloud sandbox for running AI-generated Python code
#
# e2b.api.key  : set via env var E2B_API_KEY (see .env.example)
# e2b.base-url : E2B control-plane REST API base URL
# e2b.envd.port: port on which the sandbox's envd daemon exposes HTTP/gRPC
#                (E2B uses subdomain routing: https://{port}-{sandboxId}.e2b.app)
# e2b.envd.process.path: Connect-RPC endpoint path for process execution
#                        (verify against E2B's current envd proto — see E2BSandboxClient.java)
# ---------------------------------------------------------------------------
e2b.api.key=${E2B_API_KEY:placeholder-replace-me}
e2b.base-url=https://api.e2b.dev
e2b.envd.port=49982
e2b.envd.process.path=/envd.process.v1.Process/Start
e2b.template-id=code-interpreter-v1
e2b.python-executable=python3
e2b.runner-script=e2b_sandbox_client.py
e2b.subprocess-timeout-seconds=120

# ---------------------------------------------------------------------------
# Logging (LOGGING_GENERAL_GUIDELINES standard)
# Both console and file outputs are active simultaneously.
# ---------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.sandboxlab=INFO
logging.file.name=/home/deva/Desktop/logs/ai-logs/ai-sandboxes-lab.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%5p] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%5p] %logger{36} - %msg%n
